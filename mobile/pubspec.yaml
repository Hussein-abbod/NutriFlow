name: nutriflow
description: NutriFlow — Mobile-first nutrition tracking app.

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State management
  provider: ^6.1.2

  # Networking
  http: ^1.2.2

  # Local storage
  shared_preferences: ^2.3.2
  flutter_secure_storage: ^9.2.2

  # Typography
  google_fonts: ^6.2.1

  # Media
  image_picker: ^1.1.2

  # Barcode scanning
  mobile_scanner: ^5.2.3

  # Charts
  fl_chart: ^1.2.0

  # Material icons
  cupertino_icons: ^1.0.8
  flutter_local_notifications: ^21.0.0

  # Animations
  lottie: ^3.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/animations/
